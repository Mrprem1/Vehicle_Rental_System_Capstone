<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — RideHub</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header" id="site-nav"></header>
    <main class="container">
      <div class="form-panel">
        <h2>Sign in</h2>
        <div id="msg"></div>
        <form id="form-login" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" data-testid="login-email" name="email" type="email" autocomplete="username" required />
            <div class="field-error" id="err-email"></div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" data-testid="login-password" name="password" type="password" autocomplete="current-password" required />
            <div class="field-error" id="err-password"></div>
          </div>
          <button type="submit" class="btn btn-primary" data-testid="login-submit">Login</button>
        </form>
        <p style="margin-top: 1rem; color: var(--muted)">
          No account? <a href="register.html">Register</a>
        </p>
      </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script>
      document.getElementById('form-login').addEventListener('submit', async function (e) {
        e.preventDefault();
        const msg = document.getElementById('msg');
        msg.innerHTML = '';
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        try {
          const r = await api.post('/auth/login', { email, password });
          auth.setSession(r.token, r.user);
          window.location.href = 'bikes.html';
        } catch (err) {
          msg.innerHTML =
            '<div class="msg msg-error">' + (err.body?.message || err.message || 'Login failed') + '</div>';
        }
      });
    </script>
  </body>
</html>
